---
# FLNext-SDD 项目配置

project_name: ""
output_folder: "docs/sdd"
feature_name: ""                          # 当前功能名称，每个新功能/需求独立子目录
default_branch: "main"
project_type: "greenfield"                # greenfield / brownfield
backend_only: false                        # 纯后端项目，自动跳过前端阶段

# 功能隔离说明
# 每个功能/需求在 docs/sdd/ 下生成独立子目录：
#   docs/sdd/{feature_name}/
#     ├── requirement-scope.md
#     ├── prototype.md / .html / prd.md
#     ├── architecture.md / database.md
#     ├── adr/
#     ├── review-report.md
#     ├── api-design.md / ui-spec.md
#     ├── testcase.md / test-report.md
#     ├── SUBMISSION.md
#     ├── acceptance-report.md
#     ├── RELEASE-NOTES.md
#     └── deltas/
#
# 项目级文件（非功能相关）保持在 docs/sdd/：
#   docs/sdd/project-context.md / tech-stack.md / architecture-map.md

# 团队配置
team:
  name: "FLTeam"
  role_separator: "-"

# 文档命名规范
naming:
  feature_request: "FR-{NNN}"
  non_feature_request: "NFR-{NNN}"
  test_case: "TC-{NNN}"
  api_endpoint: "API-{NNN}"
  module: "M-{NNN}"

# Discovery 配置 (brownfield 项目)
discovery:
  scan_depth: "deep"                   # quick / deep / exhaustive
  auto_detect_tech_stack: true         # AI Agent 在 0-discovery step-02-scan 中执行（Tech Agent 扫描）
  drift_detection: true                # cli.js --drift-check 实现（含自动基线建立）
  ambiguity_threshold: 0.2             # 歧义评分阈值（0-discovery step-03-interview 中 AI Agent 计算）

# 开发配置（以下特性由 AI Agent 在运行时按 SKILL.md 步骤文件执行，非程序化引擎）
development:
  wave_execution: true                 # 7-Wave 编排（AI Agent 按 step 文件分 Wave 执行）
  dual_compilation_gate: true          # 双编译门禁（step-05-gate-a/b.md 步骤文件实现）
  subagent_execution: true             # 子代理并行（Claude Code Task tool 原生能力）
  atomic_commits: true                 # 原子提交（AI Agent 按规范执行 git commit）

# AI 自检配置
self_check:
  enabled: true                        # 提测前强制执行 AI 自检
  reference: "references/ai-self-check.md"
  report_in_mr: true                   # 自检报告附在 MR 描述中
  block_on_failure: true               # 有 ❌ 不通过项时阻止提测
  categories:                          # 启用的检查类别（backend_only: true 时自动排除 frontend）
    - performance
    - database
    - external_api
    - concurrency
    - security
    - error_handling
    - code_quality
    - frontend                        # backend_only 项目自动排除
    - cross_phase                     # v4.0 跨阶段一致性（合并自 SDD-Forge）

# 确认配置
confirmation:
  strict_words: true                   # 启用严格确认词
  allowed_confirm: ["确认", "confirm", "yes", "Y"]
  allowed_modify: ["N", "no", "需要修改"]
  allowed_save: ["S", "save", "保存进度"]

# SDD-Forge 合并能力 (v4.0) — 以下特性由 AI Agent 自律执行
cognitive_anchor:
  enabled: true                        # 每 5 步认知锚定（AI Agent 按 step-protocol.md 自查）
  step_interval: 5

circuit_breaker:
  enabled: true
  threshold: 3                         # 连续 3 次违规触发熔断（AI Agent 自查，cli.js --audit 被动检测）

cross_phase_tracker:
  enabled: true                        # 跨阶段一致性（提测时 AI 自检第 9 类，见 references/ai-self-check.md）

consultation_mode:
  enabled: true                        # 受控会诊模式（0-discovery 歧义>0.5 或 3b 投票僵局时 AI 自行触发）
  ambiguity_threshold: 0.5

integration_gate:
  enabled: true                        # 测试通过后、提测前强制全栈联调（7b-integration-gate SKILL 步骤文件实现）

delta:
  enabled: true
  auto_merge_on_archive: true
  delta_directory: "docs/sdd/{feature_name}/deltas"
  max_delta_ratio: 0.6

auto_mode:
  enabled: false                       # [预留] 自动确认模式，与严格门控冲突，暂不开放
